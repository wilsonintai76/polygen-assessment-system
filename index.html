<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assessment Generator</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400;0,700;1,400&display=swap');
      body {
        font-family: 'Arimo', Arial, sans-serif;
        background-color: #e5e7eb;
      }
      .print-exact {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      /* A4 Paper Dimensions */
      .page-a4 {
        width: 210mm;
        min-height: 297mm;
        background: white;
        margin: 0 auto;
        padding: 15mm; 
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        position: relative;
        overflow: hidden;
      }
      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }

      @media print {
        body {
          background: none;
        }
        .no-print {
          display: none;
        }
        .page-a4 {
          box-shadow: none;
          margin: 0;
          page-break-after: always;
        }
      }
    </style>

</head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #0f172a; color: white; font-family: sans-serif;">
        <div style="width: 40px; height: 40px; border: 4px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; font-weight: 900; letter-spacing: 0.2em; font-size: 12px; text-transform: uppercase;">Booting PolyGen...</p>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="./index.tsx"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  </body>
</html>
